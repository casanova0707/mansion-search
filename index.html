<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0b6e65">

<title>暗証番号検索</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;background:#0e8177;color:#fff;min-height:100vh;min-height:100dvh}
.header{background:#0b6e65;padding:12px 16px;position:sticky;top:0;z-index:10;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.header h1{font-size:18px;text-align:center;color:#f0a030;margin-bottom:10px}
.search-box{position:relative}
.search-box input{width:100%;padding:12px 16px 12px 42px;border:2px solid rgba(255,255,255,.3);border-radius:12px;background:rgba(255,255,255,.15);color:#fff;font-size:17px;outline:none;transition:border-color .2s}
.search-box input:focus{border-color:#f0a030}
.search-box input::placeholder{color:rgba(255,255,255,.6)}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:18px;color:rgba(255,255,255,.6)}
.clear-btn{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:rgba(255,255,255,.6);font-size:22px;cursor:pointer;padding:4px 8px;display:none}
.district-bar{display:flex;gap:6px;padding:10px 16px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.district-bar::-webkit-scrollbar{display:none}
.district-btn{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);color:rgba(255,255,255,.8);font-size:13px;cursor:pointer;transition:all .2s;white-space:nowrap}
.district-btn.active{background:#f0a030;border-color:#f0a030;color:#fff}
.count{text-align:center;padding:6px;font-size:13px;color:rgba(255,255,255,.6)}
.results{padding:8px 12px 100px}
.card{display:flex;align-items:center;gap:10px;background:#0b6e65;border-radius:10px;padding:10px 14px;margin-bottom:6px;border-left:4px solid #f0a030;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.card:active{transform:scale(.98)}
.card.edited{border-left-color:#ffd700}
.card.added{border-left-color:#90ee90}
.address{flex-shrink:0;font-size:14px;font-weight:700;color:#fff;min-width:120px}
.mansion-name{flex:1;font-size:13px;color:#fff;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.code{flex-shrink:0;font-size:18px;font-weight:900;color:#fff;letter-spacing:1px;font-family:'Courier New',monospace;white-space:nowrap;padding:4px 10px;background:#f0a030;border-radius:8px;user-select:all;text-align:center}
.badge{font-size:10px;padding:1px 6px;border-radius:8px;margin-left:4px;display:inline-block}
.badge-edit{background:#ffd700;color:#333}
.badge-new{background:#90ee90;color:#333}
.no-result{text-align:center;padding:60px 20px;color:rgba(255,255,255,.5);font-size:15px}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:#f0a030;color:#fff;padding:8px 20px;border-radius:20px;font-size:14px;opacity:0;transition:all .3s;pointer-events:none;z-index:100}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.fab-group{position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;align-items:center;gap:10px;z-index:20}
.fab{width:56px;height:56px;border-radius:50%;background:#f0a030;color:#fff;border:none;font-size:28px;cursor:pointer;box-shadow:0 4px 12px rgba(240,160,48,.4);display:flex;align-items:center;justify-content:center;transition:transform .2s}
.fab:active{transform:scale(.9)}
.fab-sm{width:42px;height:42px;border-radius:50%;border:none;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.fab-sm:active{transform:scale(.9)}
.fab-export{background:#2196F3}
.fab-import{background:#4CAF50}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:50;display:none;align-items:flex-end;justify-content:center}
.overlay.show{display:flex}
.modal{background:#0e8177;border-radius:20px 20px 0 0;width:100%;max-width:500px;padding:20px 20px 40px;max-height:85vh;overflow-y:auto}
.modal h2{font-size:16px;color:#f0a030;margin-bottom:16px;text-align:center}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:rgba(255,255,255,.7);margin-bottom:4px}
.field input,.field select{width:100%;padding:10px 12px;border:2px solid rgba(255,255,255,.3);border-radius:10px;background:rgba(255,255,255,.1);color:#fff;font-size:16px;outline:none}
.field input:focus,.field select:focus{border-color:#f0a030}
.modal-btns{display:flex;gap:10px;margin-top:20px}
.modal-btns button{flex:1;padding:12px;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer}
.btn-save{background:#f0a030;color:#fff}
.btn-cancel{background:rgba(255,255,255,.15);color:#fff}
.btn-delete{background:transparent;color:#ff6b6b;font-size:13px;margin-top:10px;padding:10px;border:1px solid #ff6b6b;border-radius:12px;width:100%;cursor:pointer}
.btn-reset{background:transparent;color:#ffd700;font-size:13px;margin-top:8px;padding:10px;border:1px solid #ffd700;border-radius:12px;width:100%;cursor:pointer}
@media(min-width:600px){.results{max-width:600px;margin:0 auto}.header{padding:12px calc(50% - 290px)}}
</style>
</head>

const LS_EDITS='mc_edits';
const LS_ADDS='mc_adds';
const LS_DELS='mc_dels';

function loadJSON(key,def){try{return JSON.parse(localStorage.getItem(key))||def}catch{return def}}
function saveJSON(key,val){localStorage.setItem(key,JSON.stringify(val))}

let edits=loadJSON(LS_EDITS,{});
let adds=loadJSON(LS_ADDS,[]);
let dels=loadJSON(LS_DELS,[]);
Object.assign(YOMI,loadJSON('mc_yomi',{}));

fetch('./data.json').then(r=>r.json()).then(d=>{
  if(d.data)BASE=d.data;
  if(d.yomi)Object.assign(YOMI,d.yomi);
  initDistricts();render();
}).catch(()=>{initDistricts();render()});

function getData(){
  const result=[];
  BASE.forEach((r,i)=>{
    if(dels.includes(i))return;
    if(edits[i]){
      const e=edits[i];
      result.push({d:e[0]||r[0],t:e[1]||r[1],a:e[2]||r[2],m:e[3]||r[3],c:e[4]!=null?e[4]:r[4],type:'base',idx:i,edited:true});
    }else{
      result.push({d:r[0],t:r[1],a:r[2],m:r[3],c:r[4],type:'base',idx:i,edited:false});
    }
  });
  adds.forEach((r,i)=>{
    result.push({d:r[0],t:r[1],a:r[2],m:r[3],c:r[4],type:'add',idx:i,edited:false});
  });
  return result;
}

let activeDistrict='';

function initDistricts(){
  const districts=[...new Set(BASE.map(r=>r[0]))];
  const districtBar=document.getElementById('districtBar');
  districtBar.innerHTML='';
  const allBtn=document.createElement('button');
  allBtn.className='district-btn active';
  allBtn.textContent='全て';
  allBtn.onclick=()=>{activeDistrict='';updateDistrictUI();render()};
  districtBar.appendChild(allBtn);
  districts.forEach(d=>{
    const b=document.createElement('button');
    b.className='district-btn';
    b.textContent=d;
    b.onclick=()=>{activeDistrict=d;updateDistrictUI();render()};
    districtBar.appendChild(b);
  });
}

function updateDistrictUI(){
  districtBar.querySelectorAll('.district-btn').forEach(b=>{
    b.classList.toggle('active',activeDistrict?b.textContent===activeDistrict:b.textContent==='全て');
  });
}

const qEl=document.getElementById('q');
const clearBtn=document.getElementById('clearBtn');
const countEl=document.getElementById('count');
const resultsEl=document.getElementById('results');

qEl.addEventListener('input',()=>{
  clearBtn.style.display=qEl.value?'block':'none';
  render();
});

function clearSearch(){qEl.value='';clearBtn.style.display='none';qEl.focus();render()}

function normalize(s){return s.toLowerCase().replace(/[\s　]/g,'').replace(/[０-９]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0)).replace(/[ー−–—\-]/g,'-')}

function render(){
  const q=normalize(qEl.value);
  let data=getData();
  if(activeDistrict)data=data.filter(r=>r.d===activeDistrict);
  if(q)data=data.filter(r=>{
    const y=YOMI[r.t]||'';
    const s=normalize(r.d+r.t+r.a+r.m+r.c)+' '+y;
    return s.includes(q);
  });
  countEl.textContent=data.length+'件';
  if(!data.length){resultsEl.innerHTML='<div class="no-result">該当なし</div>';return}
  const show=data.length>100?data.slice(0,100):data;
  let html=show.map(r=>{
    const extra=r.type==='add'?' added':r.edited?' edited':'';
    const codeStyle=r.c?'':' style="background:#888;font-size:13px"';
    const codeText=r.c||'未登録';
    const badge=r.type==='add'?'<span class="badge badge-new">新規</span>':r.edited?'<span class="badge badge-edit">編集済</span>':'';
    return '<div class="card'+extra+'" onclick="openEdit(\''+r.type+'\','+r.idx+')"><div class="address">'+esc(r.a)+badge+'</div><div class="code"'+codeStyle+'>'+esc(codeText)+'</div><div class="mansion-name">'+esc(r.m)+'</div></div>';
  }).join('');
  if(data.length>100)html+='<div class="no-result">他 '+(data.length-100)+'件... 絞り込んでください</div>';
  resultsEl.innerHTML=html;
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1500);
}

function openEdit(type,idx){
  let r;
  if(type==='base'){
    const orig=BASE[idx];
    const e=edits[idx];
    r=e?[e[0]||orig[0],e[1]||orig[1],e[2]||orig[2],e[3]||orig[3],e[4]!=null?e[4]:orig[4]]:[...orig];
  }else{
    r=[...adds[idx]];
  }
  const isEdited=type==='base'&&!!edits[idx];
  const modal=document.getElementById('modal');
  modal.innerHTML=
    '<h2>データ編集</h2>'+
    '<div class="field"><label>地区</label><input id="ed_d" value="'+esc(r[0])+'"></div>'+
    '<div class="field"><label>町名</label><input id="ed_t" value="'+esc(r[1])+'"></div>'+
    '<div class="field"><label>住所</label><input id="ed_a" value="'+esc(r[2])+'"></div>'+
    '<div class="field"><label>マンション名</label><input id="ed_m" value="'+esc(r[3])+'"></div>'+
    '<div class="field"><label>暗証番号</label><input id="ed_c" value="'+esc(r[4])+'" style="font-size:20px;font-weight:bold;color:#e94560"></div>'+
    '<div class="modal-btns"><button class="btn-cancel" onclick="closeModal()">キャンセル</button><button class="btn-save" onclick="saveEdit(\''+type+'\','+idx+')">保存</button></div>'+
    '<button class="btn-delete" onclick="deleteEntry(\''+type+'\','+idx+')">このデータを削除</button>'+
    (isEdited?'<button class="btn-reset" onclick="resetEdit('+idx+')">元に戻す</button>':'');
  document.getElementById('overlay').classList.add('show');
}

function openAdd(){
  const modal=document.getElementById('modal');
  modal.innerHTML=
    '<h2>新規追加</h2>'+
    '<div class="field"><label>地区</label><input id="ed_d" placeholder="例: 中区"></div>'+
    '<div class="field"><label>町名</label><input id="ed_t" placeholder="例: 大手町"></div>'+
    '<div class="field"><label>住所</label><input id="ed_a" placeholder="例: 大手町1-2-3"></div>'+
    '<div class="field"><label>マンション名</label><input id="ed_m" placeholder="例: ○○マンション"></div>'+
    '<div class="field"><label>暗証番号</label><input id="ed_c" placeholder="例: 1234" style="font-size:20px;font-weight:bold;color:#e94560"></div>'+
    '<div class="modal-btns"><button class="btn-cancel" onclick="closeModal()">キャンセル</button><button class="btn-save" onclick="saveAdd()">追加</button></div>';
  document.getElementById('overlay').classList.add('show');
}

function saveEdit(type,idx){
  const d=document.getElementById('ed_d').value.trim();
  const t=document.getElementById('ed_t').value.trim();
  const a=document.getElementById('ed_a').value.trim();
  const m=document.getElementById('ed_m').value.trim();
  const c=document.getElementById('ed_c').value.trim();
  if(!m){showToast('マンション名を入力してください');return}
  if(type==='base'){
    edits[idx]=[d,t,a,m,c];
    saveJSON(LS_EDITS,edits);
  }else{
    adds[idx]=[d,t,a,m,c];
    saveJSON(LS_ADDS,adds);
  }
  closeModal();
  render();
  showToast('保存しました');
}

function saveAdd(){
  const d=document.getElementById('ed_d').value.trim();
  const t=document.getElementById('ed_t').value.trim();
  const a=document.getElementById('ed_a').value.trim();
  const m=document.getElementById('ed_m').value.trim();
  const c=document.getElementById('ed_c').value.trim();
  if(!m){showToast('マンション名を入力してください');return}
  adds.push([d,t,a,m,c]);
  saveJSON(LS_ADDS,adds);
  closeModal();
  render();
  showToast('追加しました');
}

function deleteEntry(type,idx){
  if(!confirm('このデータを削除しますか？'))return;
  if(type==='base'){
    dels.push(idx);
    saveJSON(LS_DELS,dels);
    delete edits[idx];
    saveJSON(LS_EDITS,edits);
  }else{
    adds.splice(idx,1);
    saveJSON(LS_ADDS,adds);
  }
  closeModal();
  render();
  showToast('削除しました');
}

function resetEdit(idx){
  if(!confirm('編集内容を元に戻しますか？'))return;
  delete edits[idx];
  saveJSON(LS_EDITS,edits);
  closeModal();
  render();
  showToast('元に戻しました');
}

function closeModal(){document.getElementById('overlay').classList.remove('show')}

function exportData(){
  const data={edits,adds,dels,exported:new Date().toLocaleString('ja-JP')};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='mansion_backup_'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('バックアップ保存しました');
}

function importData(){document.getElementById('importFile').click()}

function handleImport(e){
  const file=e.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const data=JSON.parse(ev.target.result);
      if(!confirm('バックアップを復元しますか？\n(現在の編集データは上書きされます)'))return;
      if(data.edits){edits=data.edits;saveJSON(LS_EDITS,edits)}
      if(data.adds){adds=data.adds;saveJSON(LS_ADDS,adds)}
      if(data.dels){dels=data.dels;saveJSON(LS_DELS,dels)}
      if(data.yomi){
        const customYomi=loadJSON('mc_yomi',{});
        Object.assign(customYomi,data.yomi);
        saveJSON('mc_yomi',customYomi);
        Object.assign(YOMI,customYomi);
      }
      render();
      showToast('復元しました');
    }catch{showToast('ファイルが読み込めません')}
  };
  reader.readAsText(file);
  e.target.value='';
}

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js');
}
</script>
</body>
